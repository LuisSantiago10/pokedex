<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokedex</title>
</head>
<body class="pokedex">
    <div class="pokedex-main" >
        <div class="pokedex-header">
            <div class="pokedex-left">
                <div class="header-button1"></div>
            </div>
            <div class="pokedex-right">
                <div class="header-button2"></div>
                <div class="header-button4"></div>
                <div class="header-button3"></div>
            </div>
        </div>
        <div class="pokedex-body" id="pokedex-main">
            <div class="body-pokemon">
                <img id="pokeImg" alt="img" class="pokemon-img">
                <p> <span id="pokeOrder"></span> - <span id="pokeName" ></span> </p>
                <span id="base_experience"></span>
            </div>
            <div id="body-bar" class="body-bar"></div>
            <div class="body-pokemon-detail">
                <span id="weight"></span>
                <span id="height"></span>
                <span id="types"></span>
                <span id="abilities"></span>
            </div>
        </div>
        <div class="pokedex-footer">
            <button class="button" onclick="getPokemon()" >Buscar</button>
            <input type="text" placeholder="pokemon" id="nombre_pokemon">
            <div>
                <div class="barbutton1"></div>
                <br>
                <div class="barbutton2"></div>
            </div>
        </div>
    </div>
</body>
<footer>
    <script src="pokedex.js"></script>
</footer>
</html>
